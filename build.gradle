buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        // Force Loom to use a newer ASM version that understands Java 25 (Version 69)
        classpath 'org.ow2.asm:asm:9.8'
        classpath 'org.ow2.asm:asm-tree:9.8'
        classpath 'org.ow2.asm:asm-commons:9.8'
        classpath 'org.ow2.asm:asm-util:9.8'
    }
}

plugins {
    id 'fabric-loom' version '1.9-SNAPSHOT'
}

version = project.mod_version
group = project.maven_group
base { archivesName = project.archives_base_name }

repositories {
    maven { url "https://maven.fabricmc.net/" }
    maven { url "https://maven.shedaniel.me/" }
    mavenCentral()
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    modImplementation "net.fabricmc:fabric-loader:${project.loader_version}"
    modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
    
    modApi("me.shedaniel.cloth:cloth-config-fabric:14.0.0") {
        exclude(group: "net.fabricmc.fabric-api")
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}
